# Cat Recognition Model Configuration
# Target: Laptop with NVIDIA RTX A2000 Laptop GPU (4GB VRAM)

# ============================================================
# Model Configuration
# ============================================================
model:
  name: "yolov8n"              # YOLOv8 nano (3.2M params)
  input_size: [640, 640]       # 输入分辨率
  num_classes: 1               # 单类别：cat
  pretrained: true             # 使用 COCO 预训练权重

# ============================================================
# Training Configuration
# ============================================================
training:
  epochs: 100
  batch_size: 32               # RTX A2000 4GB VRAM 可容纳
  imgsz: 640
  optimizer: "AdamW"
  lr0: 0.001                   # 初始学习率
  lrf: 0.01                    # 最终学习率因子
  momentum: 0.937
  weight_decay: 0.0005
  warmup_epochs: 3
  warmup_momentum: 0.8
  warmup_bias_lr: 0.1
  
  # 数据增强
  augmentation:
    hsv_h: 0.015               # HSV-Hue 增强
    hsv_s: 0.7                 # HSV-Saturation 增强
    hsv_v: 0.4                 # HSV-Value 增强
    degrees: 10.0              # 旋转角度
    translate: 0.1             # 平移
    scale: 0.5                 # 缩放
    shear: 2.0                 # 剪切
    perspective: 0.0005        # 透视变换
    flipud: 0.0                # 上下翻转（猫通常不翻转）
    fliplr: 0.5                # 左右翻转
    mosaic: 1.0                # Mosaic 增强
    mixup: 0.1                 # MixUp 增强
    copy_paste: 0.0            # Copy-Paste 增强

  # 早停与检查点
  patience: 20                 # 早停耐心轮数
  save_period: 10              # 每 N 轮保存一次
  device: "cuda:0"             # RTX A2000

# ============================================================
# Dataset Configuration
# ============================================================
dataset:
  # COCO 2017 猫类别 (category_id=15 in COCO 80-class, 17 in 91-class)
  coco_path: "./datasets/coco"
  custom_path: "./datasets/custom_cat"
  
  # 数据集划分
  train_ratio: 0.8
  val_ratio: 0.1
  test_ratio: 0.1

  # 教室场景特殊配置
  # 由于小车摄像头角度较低，猫可能出现在地面、桌面等位置
  # 需要确保训练集包含低角度、小目标、部分遮挡场景

# ============================================================
# Inference Configuration (毫秒级延迟)
# ============================================================
inference:
  device: "cuda:0"
  half: true                    # FP16 推理（RTX A2000 原生支持）
  imgsz: 640
  conf_threshold: 0.25          # 置信度阈值
  iou_threshold: 0.45           # NMS IoU 阈值
  max_det: 10                   # 最大检测数
  
  # 延迟目标
  target_latency_ms: 10         # 目标推理延迟 < 10ms
  max_latency_ms: 50            # 最大可接受延迟

# ============================================================
# Export Configuration
# ============================================================
export:
  formats:
    - "onnx"                    # ONNX 通用格式
    - "tensorrt"                # TensorRT（RTX A2000 最优）
  
  onnx:
    opset: 17
    dynamic: false              # 固定输入尺寸以获得最佳性能
    simplify: true              # 简化 ONNX 图
  
  tensorrt:
    fp16: true                  # FP16 精度
    workspace: 2                # GB, RTX A2000 4GB 可用 2GB
    batch_size: 1               # 单帧推理

# ============================================================
# Server Configuration (接收树莓派视频帧)
# ============================================================
server:
  host: "0.0.0.0"
  udp_port: 9001               # UDP 接收视频帧
  tcp_port: 9002               # TCP 返回推理结果
  max_frame_size: 65536        # 最大单帧大小（JPEG 压缩后）
  frame_timeout_ms: 5000       # 帧接收超时
  heartbeat_interval_ms: 200   # 心跳间隔
